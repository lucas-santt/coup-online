<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coup - Play Online</title>
    <meta name="description" content="Enter the medieval court of Coup. Claim your influence, execute your deceit, and challenge your rivals in this online multiplayer implementation of the classic card game.">
    
    <!-- Typography: Cinzel for elegant headers, MedievalSharp for theme accents, Cormorant Garamond for serif text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/styles/landing.css">
</head>
<body>
    <!-- Background overlay for depth and texture -->
    <div class="ambient-overlay"></div>
    <div class="background-vignette"></div>

    <!-- Main Container -->
    <main class="page-container">
        <div class="scroll-container">
            <!-- Red Wax Seal at the top center -->
            <div class="wax-seal-wrapper">
                <img src="/static/assets/wax_seal.png" alt="Royal Wax Seal" class="wax-seal-img" id="seal-logo" style="mix-blend-mode: normal;">
            </div>

            <!-- Ornate SVG Corners for the medieval scroll look -->
            <div class="ornate-corner top-left">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M10,10 L90,10 M10,10 L10,90 M20,20 L80,20 M20,20 L20,80 M10,50 C10,30 30,10 50,10 M50,10 C40,25 25,40 20,60" fill="none" stroke="var(--color-gold)" stroke-width="2"/>
                    <circle cx="20" cy="20" r="4" fill="var(--color-gold)"/>
                    <circle cx="50" cy="10" r="3" fill="var(--color-gold-light)"/>
                    <circle cx="10" cy="50" r="3" fill="var(--color-gold-light)"/>
                </svg>
            </div>
            <div class="ornate-corner top-right">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M90,10 L10,10 M90,10 L90,90 M80,20 L20,20 M80,20 L80,80 M90,50 C90,30 70,10 50,10 M50,10 C60,25 75,40 80,60" fill="none" stroke="var(--color-gold)" stroke-width="2"/>
                    <circle cx="80" cy="20" r="4" fill="var(--color-gold)"/>
                    <circle cx="50" cy="10" r="3" fill="var(--color-gold-light)"/>
                    <circle cx="90" cy="50" r="3" fill="var(--color-gold-light)"/>
                </svg>
            </div>
            <div class="ornate-corner bottom-left">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M10,90 L90,90 M10,90 L10,10 M20,80 L80,80 M20,80 L20,20 M10,50 C10,70 30,90 50,90 M50,90 C40,75 25,60 20,40" fill="none" stroke="var(--color-gold)" stroke-width="2"/>
                    <circle cx="20" cy="80" r="4" fill="var(--color-gold)"/>
                    <circle cx="50" cy="90" r="3" fill="var(--color-gold-light)"/>
                    <circle cx="10" cy="50" r="3" fill="var(--color-gold-light)"/>
                </svg>
            </div>
            <div class="ornate-corner bottom-right">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M90,90 L10,90 M90,90 L90,10 M80,80 L20,80 M80,80 L80,20 M90,50 C90,70 70,90 50,90 M50,90 C60,75 75,60 80,40" fill="none" stroke="var(--color-gold)" stroke-width="2"/>
                    <circle cx="80" cy="80" r="4" fill="var(--color-gold)"/>
                    <circle cx="50" cy="90" r="3" fill="var(--color-gold-light)"/>
                    <circle cx="90" cy="50" r="3" fill="var(--color-gold-light)"/>
                </svg>
            </div>

            <!-- Header Title -->
            <header class="scroll-header">
                <h1 class="game-title">COUP</h1>
                <p class="game-subtitle">A Game of Influence and Deceit</p>
                
                <!-- Ornate Gold Divider -->
                <div class="gold-divider">
                    <svg viewBox="0 0 300 20" width="100%" height="100%">
                        <line x1="0" y1="10" x2="120" y2="10" stroke="var(--color-gold)" stroke-width="1.5"/>
                        <line x1="180" y1="10" x2="300" y2="10" stroke="var(--color-gold)" stroke-width="1.5"/>
                        <polygon points="150,2 162,10 150,18 138,10" fill="var(--color-gold)"/>
                        <circle cx="127" cy="10" r="3" fill="var(--color-gold-light)"/>
                        <circle cx="173" cy="10" r="3" fill="var(--color-gold-light)"/>
                    </svg>
                </div>
            </header>

            <!-- Authentication Sections -->
            <section class="auth-section">
                <!-- Navigation Tabs -->
                <div class="auth-tabs" role="tablist">
                    <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login">
                        Log In
                    </button>
                    <button class="tab-btn" id="tab-signup" role="tab" aria-selected="false" aria-controls="panel-signup">
                        Sign Up
                    </button>
                </div>

                <!-- Form Panels Container -->
                <div class="panels-container">
                    <!-- Log In Form -->
                    <form id="panel-login" class="auth-form active" role="tabpanel" aria-labelledby="tab-login">
                        <div class="input-group">
                            <label for="login-username" class="input-label">Moniker</label>
                            <input type="text" id="login-username" name="username" placeholder="Thy moniker..." required autocomplete="username">
                        </div>
                        <div class="input-group">
                            <label for="login-password" class="input-label">Passphrase</label>
                            <input type="password" id="login-password" name="password" placeholder="Thy secret passphrase..." required autocomplete="current-password">
                        </div>
                        <button type="submit" class="medieval-btn primary-btn">
                            <span class="btn-text">Enter the Court</span>
                            <span class="btn-border"></span>
                        </button>
                    </form>

                    <!-- Sign Up Form -->
                    <form id="panel-signup" class="auth-form" role="tabpanel" aria-labelledby="tab-signup" style="display: none;">
                        <div class="input-group">
                            <label for="signup-username" class="input-label">Moniker</label>
                            <input type="text" id="signup-username" name="username" placeholder="Choose thy moniker..." required autocomplete="username">
                        </div>
                        <div class="input-group">
                            <label for="signup-password" class="input-label">Passphrase</label>
                            <input type="password" id="signup-password" name="password" placeholder="Create a strong passphrase..." required autocomplete="new-password">
                        </div>
                        <div class="input-group">
                            <label for="signup-confirm-password" class="input-label">Confirm Passphrase</label>
                            <input type="password" id="signup-confirm-password" name="confirm_password" placeholder="Repeat thy passphrase..." required autocomplete="new-password">
                        </div>
                        <button type="submit" class="medieval-btn primary-btn">
                            <span class="btn-text">Pledge Allegiance</span>
                            <span class="btn-border"></span>
                        </button>
                    </form>
                </div>

                <!-- Form Toggle Link -->
                <div class="auth-toggle-link-container">
                    <p class="toggle-text" id="toggle-hint-text">
                        Don't have an account? <a href="#" id="link-toggle-auth" class="renaissance-link">Sign up</a>
                    </p>
                </div>
            </section>

            <!-- Play as Guest Section -->
            <section class="guest-section">
                <!-- Golden Divider -->
                <div class="gold-divider mini">
                    <svg viewBox="0 0 200 20" width="100%" height="100%">
                        <line x1="0" y1="10" x2="80" y2="10" stroke="var(--color-gold)" stroke-width="1"/>
                        <line x1="120" y1="10" x2="200" y2="10" stroke="var(--color-gold)" stroke-width="1"/>
                        <circle cx="100" cy="10" r="4" fill="var(--color-gold)"/>
                    </svg>
                </div>
                
                <p class="guest-desc">Or enter the realm incognito, without a ledger.</p>
                <button type="button" id="btn-guest" class="medieval-btn secondary-btn">
                    <span class="btn-text">Play as Guest</span>
                    <span class="btn-border"></span>
                </button>
            </section>
        </div>
    </main>

    <!-- Background Music -->
    <audio id="bg-music" src="/static/assets/theme.mp3" loop preload="auto"></audio>

    <!-- Floating Music Controls -->
    <div class="music-controls" id="music-controls">
        <button class="music-btn" id="btn-music-toggle" title="Toggle music" aria-label="Mute music">
            <span id="music-icon">&#9835;</span>
        </button>
        <div class="volume-slider-wrapper" id="volume-wrapper">
            <input type="range" id="volume-slider" min="0" max="100" value="15" aria-label="Volume">
        </div>
    </div>

    <!-- Custom Medieval Toast Notification System -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Script loading -->
    <script src="/static/scripts/landing/main.js"></script>
</body>
</html>
